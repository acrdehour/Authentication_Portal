<div class="app-layout">

  <nav class="navbar">
    <div class="navbar-brand">
      <div class="navbar-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M12 2C9.243 2 7 4.243 7 7v2H6c-1.103 0-2 .897-2 2v9c0 1.103.897
                   2 2 2h12c1.103 0 2-.897 2-2v-9c0-1.103-.897-2-2-2h-1V7c0-2.757-2.243-5-5-5zm0
                   2c1.654 0 3 1.346 3 3v2H9V7c0-1.654 1.346-3 3-3zm1 11.723V17h-2v-1.277A1.992
                   1.992 0 0 1 10 14c0-1.103.897-2 2-2s2 .897 2 2a1.992 1.992 0 0 1-1 1.723z"/>
        </svg>
      </div>
      <span class="navbar-name">AuthPortal</span>
    </div>

    <div class="navbar-actions">
      @if (username) {
        <span class="navbar-user">{{ username }}</span>
      }
      <button class="btn-outline" type="button" (click)="logout()">Sign out</button>
    </div>
  </nav>

  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title">Dashboard</h1>
      <p class="page-subtitle">You are successfully authenticated.</p>
    </div>

    <div class="welcome-card">
      <div class="welcome-card-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M12 2a5 5 0 1 0 5 5 5 5 0 0 0-5-5zm0 8a3 3 0 1 1 3-3 3 3 0 0 1-3
                   3zm9 11v-1a7 7 0 0 0-7-7h-4a7 7 0 0 0-7 7v1h2v-1a5 5 0 0 1 5-5h4a5 5 0
                   0 1 5 5v1z"/>
        </svg>
      </div>
      <div class="welcome-card-body">
        <p class="welcome-card-title">Welcome back{{ username ? ', ' + username : '' }}!</p>
        <p class="welcome-card-text">Your session is active and your identity has been verified.</p>
      </div>
    </div>
  </main>

</div>
