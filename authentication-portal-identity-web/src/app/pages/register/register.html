<div class="auth-page">
  <div class="auth-card">

    <div class="auth-brand">
      <div class="auth-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M12 2C9.243 2 7 4.243 7 7v2H6c-1.103 0-2 .897-2 2v9c0 1.103.897
                   2 2 2h12c1.103 0 2-.897 2-2v-9c0-1.103-.897-2-2-2h-1V7c0-2.757-2.243-5-5-5zm0
                   2c1.654 0 3 1.346 3 3v2H9V7c0-1.654 1.346-3 3-3zm1 11.723V17h-2v-1.277A1.992
                   1.992 0 0 1 10 14c0-1.103.897-2 2-2s2 .897 2 2a1.992 1.992 0 0 1-1 1.723z"/>
        </svg>
      </div>
      <h1 class="auth-title">Create an account</h1>
      <p class="auth-subtitle">Enter your details to get started</p>
    </div>

    <div class="form-fields">
      <div class="field">
        <label for="register-user">Username</label>
        <input
          id="register-user"
          type="text"
          placeholder="Choose a username"
          autocomplete="username"
          [(ngModel)]="username">
      </div>

      <div class="field">
        <label for="register-password">Password</label>
        <input
          id="register-password"
          type="password"
          placeholder="Create a password"
          autocomplete="new-password"
          [(ngModel)]="password">
      </div>

      <div class="field">
        <label for="register-confirm-password">Confirm Password</label>
        <input
          id="register-confirm-password"
          type="password"
          placeholder="Repeat your password"
          autocomplete="new-password"
          [(ngModel)]="confirmPassword">
      </div>
    </div>

    @if (errorMessage()) {
      <div class="error-banner" role="alert">
        <span>{{ errorMessage() }}</span>
      </div>
    }

    <button class="btn-primary" type="button" (click)="register()">
      Create account
    </button>

    <p class="auth-footer">
      Already have an account?&nbsp;<a routerLink="/login">Sign in</a>
    </p>

  </div>
</div>
